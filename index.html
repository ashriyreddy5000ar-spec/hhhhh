<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">


<script>
(function(){
  function makeIcon(size){
    var c=document.createElement('canvas');c.width=size;c.height=size;
    var ctx=c.getContext('2d');
    ctx.fillStyle='#080808';
    ctx.beginPath();ctx.roundRect(0,0,size,size,size*0.15);ctx.fill();
    var s=size/32;
    ctx.strokeStyle='#D4A853';ctx.lineWidth=3*s;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(8*s,16*s);ctx.lineTo(13.5*s,22*s);ctx.lineTo(24*s,10*s);ctx.stroke();
    ctx.shadowColor='rgba(212,168,83,0.5)';ctx.shadowBlur=4*s;
    ctx.stroke();
    return c.toDataURL('image/png');
  }
  var link=document.querySelector('link[rel="manifest"]');
  if(link){
    var m={name:"My Habits PRO",short_name:"Habits",start_url:"./",display:"standalone",
      background_color:"#080808",theme_color:"#080808",
      icons:[{src:makeIcon(192),sizes:"192x192",type:"image/png"},
             {src:makeIcon(512),sizes:"512x512",type:"image/png"}]};
    var blob=new Blob([JSON.stringify(m)],{type:'application/json'});
    link.href=URL.createObjectURL(blob);
  }
